<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Quinielas Oficiales</title>
    <style>
        /* ==========================================================================
           Estilos Globales y Contenedor Principal
           ========================================================================== */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9; /* Fondo gris claro tipo aplicación */
            color: #1e293b;
            padding: 40px 15px;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        #panel-quiniela {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: none; /* Se muestra solo cuando los datos se cargan correctamente */
        }

        /* Loader de carga */
        #loader {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        /* ==========================================================================
           Nueva Cabecera Profesional
           ========================================================================== */
        .cabecera-oficial {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
        }

        .cabecera-titulo {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0f172a; /* Negro/Azul profundo */
            margin: 0;
        }

        .pastilla-fecha {
            background-color: #f1f5f9;
            color: #475569;
            padding: 6px 14px;
            border-radius: 9999px; /* Forma de píldora/pastilla */
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
            border: 1px solid #e2e8f0;
        }

        /* ==========================================================================
           Maquetación de la Tabla de Resultados (Limpieza Absoluta)
           ========================================================================== */
        .tabla-contenedor {
            padding: 12px;
        }

        .tabla-moderna {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        /* Reset radical de propiedades de la tabla nativa */
        .tabla-moderna td, 
        .tabla-moderna tr,
        .tabla-moderna font,
        .tabla-moderna b {
            background: none !important;
            border: none !important;
            font-family: inherit !important;
        }

        /* Cabeceras de los turnos (Previa, Primera, Matutina...) */
        .tabla-moderna tr:first-child td {
            background-color: #f8fafc !important;
            padding: 12px 4px !important;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
        }

        .tabla-moderna tr:first-child font {
            color: #64748b !important; /* Gris intermedio legible */
            font-weight: 700 !important;
            font-size: 11px !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Filas de datos de las provincias */
        .fila-datos:hover {
            background-color: #f8fafc;
        }

        .celda-provincia {
            padding: 16px 12px !important;
            text-align: left;
            border-bottom: 1px solid #f1f5f9 !important;
            font-weight: 600;
            font-size: 13px;
            color: #334155 !important; /* Forzar color oscuro para el texto de la provincia */
        }

        .celda-numero {
            text-align: center;
            padding: 10px 4px !important;
            border-bottom: 1px solid #f1f5f9 !important;
        }

        /* Estilo base de los números (cuando están vacíos con ----) */
        .celda-numero font {
            font-size: 13px !important;
            font-weight: 600 !important;
            color: #cbd5e1 !important; /* Gris muy tenue para guiones */
            background: #f8fafc;
            padding: 6px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        /* Resaltado Premium cuando hay un número ganador cargado */
        .numero-activo {
            color: #166534 !important; /* Verde oscuro nítido */
            background: #dcfce7 !important; /* Fondo verde pastel sutil */
            font-weight: 700 !important;
        }
    </style>
</head>
<body>

    <div id="loader">Cargando resultados de la quiniela...</div>

    <div id="panel-quiniela">
        <header class="cabecera-oficial">
            <h1 class="cabecera-titulo">Resultados de quinielas</h1>
            <span class="pastilla-fecha" id="fecha-sorteo">--/--/----</span>
        </header>
        
        <div class="tabla-contenedor" id="contenedor-tabla-pura">
            </div>
    </div>

    <script>
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        async function cargarQuiniela() {
            try {
                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!respuesta.ok) throw new Error("Error en la respuesta del proxy.");
                
                const textoHtml = await respuesta.text();
                
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');
                const tablaOriginal = docInterno.querySelector('table');
                
                if (tablaOriginal) {
                    const filasOriginales = tablaOriginal.querySelectorAll('tr');
                    
                    if (filasOriginales.length > 0) {
                        // 1. EXTRACCIÓN DINÁMICA DE LA FECHA
                        // Buscamos el texto dentro de la primera fila original
                        const textoCabeceraOriginal = filasOriginales[0].textContent || "";
                        // Usamos Regex para capturar el formato de fecha (ej. 10/7/2026 o similar)
                        const resultadoFecha = textoCabeceraOriginal.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
                        
                        if (resultadoFecha) {
                            document.getElementById('fecha-sorteo').textContent = resultadoFecha[0];
                        }

                        // 2. FILTRADO GLOBAL DE ENLACES: Convertir todos los tags <a> en texto plano
                        const todosLosLinks = tablaOriginal.querySelectorAll('a');
                        todosLosLinks.forEach(link => link.replaceWith(link.textContent));

                        // 3. LIMPIEZA DE ESTRUCTURA VIEJA
                        // Eliminamos la fila 0 (El título viejo "QUINIELA DE HOY") ya que tenemos la nueva cabecera
                        filasOriginales[0].remove();
                        // Eliminamos la última fila (El pie de página viejo con el link)
                        filasOriginales[filasOriginales.length - 1].remove();

                        // 4. ASIGNACIÓN DE CLASES Y PROCESAMIENTO DE TEXTOS OCULTOS
                        tablaOriginal.classList.add('tabla-moderna');
                        
                        // Volvemos a leer las filas sobrevivientes (ahora el índice 0 son los turnos de horarios)
                        const filasRestantes = tablaOriginal.querySelectorAll('tr');
                        
                        filasRestantes.forEach((fila, index) => {
                            if (index > 0) { // Saltamos la cabecera de turnos
                                fila.classList.add('fila-datos');
                                
                                const celdas = fila.querySelectorAll('td');
                                celdas.forEach((celda, cIndex) => {
                                    if (cIndex === 0) {
                                        celda.classList.add('celda-provincia');
                                    } else {
                                        celda.classList.add('celda-numero');
                                        
                                        const fontTag = celda.querySelector('font');
                                        if (fontTag) {
                                            const textoNumero = fontTag.textContent.trim();
                                            // Si tiene número cargado y no son guiones, activamos el formato destacado
                                            if (textoNumero && !textoNumero.includes('----') && textoNumero !== '') {
                                                fontTag.classList.add('numero-activo');
                                            }
                                        }
                                    }
                                });
                            }
                        });

                        // 5. RENDERIZACIÓN FINAL
                        document.getElementById('loader').style.display = 'none';
                        const contenedorTabla = document.getElementById('contenedor-tabla-pura');
                        contenedorTabla.innerHTML = '';
                        contenedorTabla.appendChild(tablaOriginal);
                        document.getElementById('panel-quiniela').style.display = 'block';
                    }
                } else {
                    throw new Error("No se encontró la estructura de tabla.");
                }

            } catch (error) {
                console.error("Detalle:", error);
                document.getElementById('loader').innerHTML = 
                    "Error al sincronizar con la pizarra oficial. Reintentando automáticamente...";
                setTimeout(cargarQuiniela, 4000);
            }
        }

        // Ejecutar carga de datos
        cargarQuiniela();
    </script>
</body>
</html>
