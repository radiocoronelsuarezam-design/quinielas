<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Quiniela</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #contenedor-quiniela {
            width: 100%;
            max-width: 500px;
        }

        /* Forzar la limpieza de los estilos antiguos heredados */
        #contenedor-quiniela table, 
        #contenedor-quiniela td, 
        #contenedor-quiniela tr {
            background: none !important;
            border: none !important;
        }

        /* Diseño de tarjeta moderno */
        .tabla-moderna {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        /* Cabecera Principal */
        .tabla-moderna tr:first-child td {
            background: linear-gradient(135deg, #e63946, #d90429) !important;
            padding: 18px !important;
            text-align: center;
        }

        .tabla-moderna tr:first-child a {
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* Cabeceras de columnas (Horarios) */
        .tabla-moderna tr:nth-child(2) td {
            background-color: #f8f9fa !important;
            padding: 12px 6px !important;
            text-align: center;
            border-bottom: 2px solid #eaeaea;
        }

        .tabla-moderna tr:nth-child(2) font {
            color: #6c757d !important;
            font-weight: 600 !important;
            font-size: 11px !important;
        }

        /* Filas de datos */
        .fila-datos:hover {
            background-color: #fdfdfd;
        }

        .celda-provincia {
            padding: 14px 16px !important;
            text-align: left;
        }

        .celda-provincia a {
            color: #2b2d42 !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .celda-numero {
            text-align: center;
            padding: 10px 4px !important;
        }

        .celda-numero font {
            font-size: 14px !important;
            font-weight: 700 !important;
            color: #2b2d42 !important;
            background: #f1f3f5;
            padding: 6px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Estilo destacado para números ya sorteados */
        .numero-activo {
            background-color: #e8f5e9 !important;
            color: #1b5e20 !important;
        }

        /* Pie de página */
        .tabla-moderna tr:last-child td {
            background-color: #f8f9fa !important;
            padding: 12px !important;
            text-align: center;
            border-top: 1px solid #eaeaea;
        }

        .tabla-moderna tr:last-child a {
            color: #a0aec0 !important;
            font-size: 11px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="contenedor-quiniela">Cargando resultados en tiempo real...</div>

    <script>
        // Cambiamos al servicio de corsproxy.io (es directo, solo se añade antes de la URL)
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        async function cargarQuiniela() {
            try {
                // Hacemos la petición a través del nuevo proxy
                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!respuesta.ok) throw new Error("El proxy no devolvió una respuesta correcta.");
                
                const textoHtml = await respuesta.text();
                
                // Parseamos el HTML plano
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');
                const tablaOriginal = docInterno.querySelector('table');
                
                if (tablaOriginal) {
                    // Aplicamos nuestra clase de estilos modernos
                    tablaOriginal.classList.add('tabla-moderna');
                    const filas = tablaOriginal.querySelectorAll('tr');
                    
                    filas.forEach((fila, index) => {
                        // Procesamos solo las filas con los números de las loterías
                        if (index > 1 && index < filas.length - 1) {
                            fila.classList.add('fila-datos');
                            
                            const celdas = fila.querySelectorAll('td');
                            celdas.forEach((celda, cIndex) => {
                                if (cIndex === 0) {
                                    celda.classList.add('celda-provincia');
                                } else {
                                    celda.classList.add('celda-numero');
                                    
                                    const fontTag = celda.querySelector('font');
                                    // Si contiene un número real y no guiones, lo resaltamos
                                    if (fontTag && fontTag.textContent && !fontTag.textContent.includes('----')) {
                                        fontTag.classList.add('numero-activo');
                                    }
                                }
                            });
                        }
                    });

                    // Inyectamos la tabla limpia en el contenedor
                    const contenedor = document.getElementById('contenedor-quiniela');
                    contenedor.innerHTML = '';
                    contenedor.appendChild(tablaOriginal);
                } else {
                    throw new Error("No se pudo leer la estructura de la tabla original.");
                }

            } catch (error) {
                console.error("Error detallado:", error);
                document.getElementById('contenedor-quiniela').innerHTML = 
                    "Error al conectar con el servidor de resultados. Intentando recargar...";
            }
        }

        // Ejecutar carga inicial
        cargarQuiniela();
    </script>
</body>
</html>
