<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Quinielas Oficial</title>
    <style>
        /* ==========================================================================
           Diseño Profesional, Limpio y Corporativo (Fondo Blanco)
           ========================================================================== */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* Fondo general gris muy claro */
            color: #1e293b;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        #contenedor-quiniela {
            width: 100%;
            max-width: 450px;
        }

        /* Limpieza absoluta de los atributos antiguos del HTML original */
        #contenedor-quiniela table, 
        #contenedor-quiniela td, 
        #contenedor-quiniela tr {
            background: none !important;
            border: none !important;
            font-family: 'Segoe UI', system-ui, sans-serif !important;
        }

        /* Contenedor principal de la tabla (Estilo tarjeta blanca) */
        .tabla-moderna {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #ffffff; /* Fondo Blanco pedido */
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Fila del Título Principal (QUINIELA DE HOY) */
        .tabla-moderna tr:first-child td {
            background: #0f172a !important; /* Azul oscuro corporativo / casi negro */
            padding: 16px !important;
            text-align: center;
            font-weight: 700 !important;
            font-size: 15px !important;
            letter-spacing: 0.5px;
            color: #ffffff !important;
            text-transform: uppercase;
        }

        /* Forzar color blanco para cualquier texto remanente en el título */
        .tabla-moderna tr:first-child font,
        .tabla-moderna tr:first-child b {
            color: #ffffff !important;
        }

        /* Fila de Encabezados de Turnos (Previa, Primera, Matutina...) */
        .tabla-moderna tr:nth-child(2) td {
            background-color: #f1f5f9 !important; /* Gris claro sutil */
            padding: 12px 4px !important;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
        }

        .tabla-moderna tr:nth-child(2) font {
            color: #475569 !important; /* Texto gris intermedio */
            font-weight: 700 !important;
            font-size: 11px !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Filas con datos de las loterías */
        .fila-datos {
            transition: background-color 0.2s ease;
        }

        .fila-datos:hover {
            background-color: #f8fafc; /* Efecto hover sutil al pasar el mouse */
        }

        /* Celdas de las Provincias / Loterías */
        .celda-provincia {
            padding: 14px 16px !important;
            text-align: left;
            border-bottom: 1px solid #f1f5f9 !important;
            font-weight: 600;
            font-size: 13px;
            color: #1e293b;
        }

        /* Celdas donde van los números */
        .celda-numero {
            text-align: center;
            padding: 10px 4px !important;
            border-bottom: 1px solid #f1f5f9 !important;
        }

        /* Estilo base para los números o guiones */
        .celda-numero font {
            font-size: 13px !important;
            font-weight: 600 !important;
            color: #94a3b8 !important; /* Color gris suave para los '----' */
            background: #f8fafc;
            padding: 6px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Resaltado profesional para los números que ya salieron (Verde Éxito) */
        .numero-activo {
            color: #15803d !important; /* Verde oscuro legible sobre fondo blanco */
            background: #dcfce7 !important; /* Fondo verde muy claro */
            font-weight: 700 !important;
        }
    </style>
</head>
<body>

    <div id="contenedor-quiniela">Cargando pizarra oficial...</div>

    <script>
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        async function cargarQuiniela() {
            try {
                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!respuesta.ok) throw new Error("Error al consultar el proxy");
                
                const textoHtml = await respuesta.text();
                
                // Parseamos el HTML obtenido
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');
                const tablaOriginal = docInterno.querySelector('table');
                
                if (tablaOriginal) {
                    
                    // 1. FILTRADO EXTREMO DE ENLACES: Eliminar absolutamente todas las etiquetas <a> de la tabla
                    // Esto remueve los enlaces del título, de las provincias y del pie de página automáticamente.
                    const todosLosLinks = tablaOriginal.querySelectorAll('a');
                    todosLosLinks.forEach(link => {
                        // Reemplazamos el enlace por su propio contenido de texto plano
                        link.replaceWith(link.textContent);
                    });

                    // 2. FILTRADO DE FILAS INUTILES: Remover la última fila (el pie de página vacío o con texto sobrante)
                    const filasActuales = tablaOriginal.querySelectorAll('tr');
                    if (filasActuales.length > 0) {
                        filasActuales[filasActuales.length - 1].remove();
                    }

                    // 3. ASIGNACIÓN DE ESTILOS MODERNOS
                    tablaOriginal.classList.add('tabla-moderna');
                    
                    // Volvemos a leer las filas restantes para procesar las celdas
                    const filasParaProcesar = tablaOriginal.querySelectorAll('tr');
                    
                    filasParaProcesar.forEach((fila, index) => {
                        // Saltamos el título (0) y los encabezados de turnos (1)
                        if (index > 1) {
                            fila.classList.add('fila-datos');
                            
                            const celdas = fila.querySelectorAll('td');
                            celdas.forEach((celda, cIndex) => {
                                if (cIndex === 0) {
                                    celda.classList.add('celda-provincia');
                                } else {
                                    celda.classList.add('celda-numero');
                                    
                                    // Evaluamos el tag font para ver si ya se cargó un número ganador
                                    const fontTag = celda.querySelector('font');
                                    if (fontTag && fontTag.textContent && !fontTag.textContent.includes('----') && fontTag.textContent.trim() !== '') {
                                        fontTag.classList.add('numero-activo');
                                    }
                                }
                            });
                        }
                    });

                    // Inyectamos la tabla limpia y rediseñada en el DOM
                    const contenedor = document.getElementById('contenedor-quiniela');
                    contenedor.innerHTML = '';
                    contenedor.appendChild(tablaOriginal);

                } else {
                    throw new Error("No se detectó la estructura de la tabla.");
                }

            } catch (error) {
                console.error("Detalle del error:", error);
                document.getElementById('contenedor-quiniela').innerHTML = 
                    "Error al actualizar los resultados. Reintentando en unos segundos...";
                
                // Intento de autorecarga automatica si falla por saturación del proxy
                setTimeout(cargarQuiniela, 5000);
            }
        }

        // Ejecución inicial
        cargarQuiniela();
    </script>
</body>
</html>
