<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Quinielas Oficiales</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            padding: 40px 15px;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        #panel-quiniela {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: none;
        }

        #loader {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        /* Cabecera Solicitada */
        .cabecera-oficial {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
        }

        .cabecera-titulo {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0f172a;
            margin: 0;
        }

        .pastilla-fecha {
            background-color: #f1f5f9;
            color: #475569;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid #e2e8f0;
        }

        /* Nueva Estructura Grid Moderna (No usa <table>) */
        .tabla-grid {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fila-grid {
            display: grid;
            grid-template-columns: 2fr repeat(5, 1fr); /* 1 columna ancha para provincia, 5 para números */
            align-items: center;
            padding: 10px 4px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Encabezados de Turnos (Previa, Primera...) */
        .cabecera-grid {
            background-color: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 700;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 12px 4px;
            border-radius: 6px;
        }

        .cabecera-grid div:first-child {
            text-align: left;
            padding-left: 8px;
        }

        /* Celdas de Datos */
        .celda-provincia {
            font-weight: 600;
            font-size: 13px;
            color: #334155;
            padding-left: 8px;
        }

        .celda-numero {
            text-align: center;
        }

        /* Formato de los números en pastillas */
        .badge-numero {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1; /* Gris para guiones ---- */
            background: #f8fafc;
            padding: 6px 4px;
            border-radius: 8px;
            display: block;
            margin: 0 2px;
            font-family: monospace;
        }

        /* Número Ganador Activo */
        .numero-activo {
            color: #166534 !important;
            background: #dcfce7 !important;
            font-weight: 700 !important;
        }

        .fila-grid:not(.cabecera-grid):hover {
            background-color: #f8fafc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="loader">Sincronizando pizarra de resultados...</div>

    <div id="panel-quiniela">
        <header class="cabecera-oficial">
            <h1 class="cabecera-titulo">Resultados de quinielas</h1>
            <span class="pastilla-fecha" id="fecha-sorteo">--/--/----</span>
        </header>
        
        <div class="tabla-grid" id="grid-resultados"></div>
    </div>

    <script>
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        async function cargarQuiniela() {
            try {
                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!respuesta.ok) throw new Error("Error de red");
                
                const textoHtml = await respuesta.text();
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');
                
                // Buscamos todas las filas TR que existan en el documento importado
                const filasOriginales = docInterno.querySelectorAll('tr');
                
                if (filasOriginales.length > 2) {
                    let datosExtraidos = [];
                    let fechaEncontrada = "--/--/----";
                    let encabezadosTurnos = [];

                    filasOriginales.forEach((fila) => {
                        const textoFila = fila.textContent || "";

                        // 1. EXTRAER FECHA (Buscamos la fila que contiene la palabra FECHA)
                        if (textoFila.includes("FECHA:")) {
                            const match = textoFila.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
                            if (match) fechaEncontrada = match[0];
                            return; // Saltamos esta fila vieja
                        }

                        // 2. EXTRAER ENCABEZADOS (Buscamos los turnos de horarios)
                        if (textoFila.includes("Provincia") || textoFila.includes("Prev") || textoFila.includes("Prim")) {
                            if (encabezadosTurnos.length === 0) {
                                fila.querySelectorAll('td').forEach(td => {
                                    encabezadosTurnos.push(td.textContent.trim());
                                });
                            }
                            return; // Saltamos esta fila vieja
                        }

                        // 3. EXTRAER FILAS DE NÚMEROS (Cualquier fila que tenga celdas con datos)
                        const celdas = fila.querySelectorAll('td');
                        if (celdas.length >= 2 && celdas[0].textContent.trim() !== "") {
                            let filaData = { provincia: celdas[0].textContent.trim(), numeros: [] };
                            
                            for (let i = 1; i < celdas.length; i++) {
                                if (celdas[i]) {
                                    filaData.numeros.push(celdas[i].textContent.trim());
                                }
                            }
                            
                            // Evitamos meter filas de links inferiores basura
                            if (filaData.provincia.length < 30 && !filaData.provincia.includes("www.")) {
                                datosExtraidos.push(filaData);
                            }
                        }
                    });

                    // Inyectar Fecha extraída en la nueva pastilla
                    document.getElementById('fecha-sorteo').textContent = fechaEncontrada;

                    // CONSTRUCCIÓN DEL NUEVO HTML DESDE CERO (A prueba de fallos)
                    const gridContenedor = document.getElementById('grid-resultados');
                    gridContenedor.innerHTML = "";

                    // Crear Fila de Encabezados
                    if (encabezadosTurnos.length > 0) {
                        const filaHeader = document.createElement('div');
                        filaHeader.className = "fila-grid cabecera-grid";
                        encabezadosTurnos.forEach(texto => {
                            filaHeader.innerHTML += `<div>${texto}</div>`;
                        });
                        gridContenedor.appendChild(filaHeader);
                    }

                    // Crear Filas de Datos de Loterías
                    datosExtraidos.forEach(item => {
                        const filaItem = document.createElement('div');
                        filaItem.className = "fila-grid";
                        
                        // Celda Provincia limpia sin links
                        filaItem.innerHTML += `<div class="celda-provincia">${item.provincia}</div>`;
                        
                        // Celdas Números limpias sin links
                        item.numeros.forEach(num => {
                            // Validar si es un número válido cargado o son guiones
                            const esActivo = num && !num.includes('----') && num !== "" ? "numero-activo" : "";
                            filaItem.innerHTML += `
                                <div class="celda-numero">
                                    <span class="badge-numero ${esActivo}">${num}</span>
                                </div>`;
                        });
                        
                        gridContenedor.appendChild(filaItem);
                    });

                    // Mostrar el panel moderno y ocultar el loader
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('panel-quiniela').style.display = 'block';

                } else {
                    throw new Error("Estructura de origen vacía o incompleta.");
                }

            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerHTML = 
                    "Error al conectar con la pizarra. Reintentando de fondo...";
                setTimeout(cargarQuiniela, 5000);
            }
        }

        cargarQuiniela();
    </script>
</body>
</html>
