<style>
    .pizarra-contenedor {
        width: 100%;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background-color: #f8fafc;
        padding: 20px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    #panel-quiniela {
        width: 100%;
        max-width: 100%; /* Ocupa todo el ancho disponible */
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        border: 1px solid #e2e8f0;
        overflow: hidden;
        box-sizing: border-box;
    }

    .cabecera-oficial {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 22px 24px;
        background-color: #ffffff;
        border-bottom: 1px solid #f1f5f9;
    }

    .cabecera-titulo {
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #0f172a;
        margin: 0;
    }

    .pastilla-fecha {
        background-color: #f1f5f9;
        color: #475569;
        padding: 6px 14px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid #e2e8f0;
    }

    .tabla-grid {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        box-sizing: border-box;
    }

    /* Diseño Grid para pantallas grandes (Escritorio / Tablet) */
    .fila-grid {
        display: grid;
        grid-template-columns: 2fr repeat(5, 1fr); 
        align-items: center;
        padding: 12px 4px;
        border-bottom: 1px solid #f8fafc;
        box-sizing: border-box;
    }

    .cabecera-grid {
        background-color: #f8fafc;
        border-bottom: 2px solid #e2e8f0;
        font-weight: 700;
        font-size: 11px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: center;
        padding: 14px 4px;
        border-radius: 8px;
        margin-bottom: 6px;
    }

    .cabecera-grid div:first-child {
        text-align: left;
        padding-left: 8px;
        color: #475569;
    }

    .celda-provincia {
        font-weight: 600;
        font-size: 14px;
        color: #334155;
        padding-left: 8px;
    }

    .celda-numero {
        text-align: center;
    }

    .badge-numero {
        font-size: 13px;
        font-weight: 600;
        color: #cbd5e1;
        background: #f8fafc;
        padding: 6px 2px;
        border-radius: 6px;
        display: block;
        margin: 0 3px;
    }

    .numero-activo {
        color: #166534 !important;
        background: #dcfce7 !important;
        font-weight: 700 !important;
    }

    .fila-grid:not(.cabecera-grid):hover {
        background-color: #f8fafc;
        border-radius: 8px;
    }

    /* ==========================================================================
       ADAPTACIÓN RESPONSIVA PARA MÓVILES (Menos de 576px)
       ========================================================================== */
    @media (max-width: 576px) {
        .cabecera-oficial {
            flex-direction: column;
            gap: 10px;
            text-align: center;
            padding: 15px;
        }

        /* Ocultamos la cabecera horizontal clásica */
        .cabecera-grid {
            display: none;
        }

        /* Convertimos cada fila en una tarjeta independiente */
        .fila-grid {
            grid-template-columns: 1fr;
            gap: 8px;
            padding: 15px;
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }

        .celda-provincia {
            font-size: 15px;
            text-align: center;
            padding: 0;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 6px;
            color: #0f172a;
        }

        /* Forzamos a que se muestre el nombre del turno al lado del número */
        .celda-numero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 5px;
        }

        /* Creamos la etiqueta del turno dinámicamente en móviles */
        .celda-numero::before {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }
        .celda-numero:nth-child(2)::before { content: "Prev (10:15)"; }
        .celda-numero:nth-child(3)::before { content: "Prim (12:00)"; }
        .celda-numero:nth-child(4)::before { content: "Matu (15:00)"; }
        .celda-numero:nth-child(5)::before { content: "Vesp (18:00)"; }
        .celda-numero:nth-child(6)::before { content: "Noct (21:00)"; }

        .badge-numero {
            width: 80px;
            text-align: center;
            margin: 0;
            padding: 5px;
        }
    }

    /* CONTINGENCIA IFRAME */
    #contingencia-iframe {
        display: none;
        width: 100%;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        border: 1px solid #e2e8f0;
        padding: 10px;
        text-align: center;
        box-sizing: border-box;
    }
    #contingencia-iframe iframe {
        border: none;
        width: 325px;
        height: 290px;
        overflow: hidden;
    }
    .alerta-contingencia {
        font-size: 11px;
        color: #94a3b8;
        margin-bottom: 8px;
        font-weight: 500;
        text-transform: uppercase;
    }
</style>

<div class="pizarra-contenedor">

    <div id="panel-quiniela">
        <header class="cabecera-oficial">
            <h1 class="cabecera-titulo">Resultados de quinielas</h1>
            <span class="pastilla-fecha" id="fecha-sorteo">--/--/----</span>
        </header>
        
        <div class="tabla-grid" id="grid-resultados">
            <div style="padding: 20px; color: #64748b; font-size: 14px; text-align: center;">Cargando datos oficiales...</div>
        </div>
    </div>

    <div id="contingencia-iframe">
        <div class="alerta-contingencia">⚠️ Modo de contingencia (Banner Original)</div>
        <iframe id="iframe-banner" src="" scrolling="no"></iframe>
    </div>

</div>

<script>
    (function() {
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        const provinciasObjetivo = [
            "Ciudad", "Provincia", "Santa Fe", "Cordoba", "Mendoza", 
            "Entre Rios", "Corrientes", "Neuquen", "Rio Negro", "Chaco", "Jujuy", "Formosa"
        ];

        async function cargarQuiniela() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);

                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl), { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!respuesta.ok) throw new Error("Proxy offline");
                
                const textoHtml = await respuesta.text();
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');

                // EXTRAER FECHA
                let fechaEncontrada = "--/--/----";
                const todosLosFuentes = docInterno.querySelectorAll('font');
                for (let font of todosLosFuentes) {
                    if (font.textContent.includes("FECHA:")) {
                        const match = font.textContent.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
                        if (match) { fechaEncontrada = match[0]; break; }
                    }
                }
                document.getElementById('fecha-sorteo').textContent = fechaEncontrada;

                // PROCESAMIENTO DE MATRIZ
                let datosLoterias = {};
                const enlacesLoterias = docInterno.querySelectorAll('a.modtit');
                
                enlacesLoterias.forEach(enlace => {
                    const nombreProvincia = enlace.textContent.trim();
                    
                    if (provinciasObjetivo.includes(nombreProvincia)) {
                        const subTabla = enlace.closest('table');
                        if (!subTabla) return;
                        
                        const tdContenedor = subTabla.parentElement;
                        if (!tdContenedor) return;
                        
                        const filaPrincipalTr = tdContenedor.closest('tr');
                        
                        if (filaPrincipalTr) {
                            const columnasPrincipales = Array.from(filaPrincipalTr.children);
                            let numerosDeEstaProvincia = [];
                            
                            for (let i = 1; i <= 5; i++) {
                                if (columnasPrincipales[i]) {
                                    numerosDeEstaProvincia.push(columnasPrincipales[i].textContent.trim());
                                } else {
                                    numerosDeEstaProvincia.push("----");
                                }
                            }
                            datosLoterias[nombreProvincia] = numerosDeEstaProvincia;
                        }
                    }
                });

                // RENDERIZAR TABLA
                const gridContenedor = document.getElementById('grid-resultados');
                gridContenedor.innerHTML = "";

                const filaHeader = document.createElement('div');
                filaHeader.className = "fila-grid cabecera-grid";
                filaHeader.innerHTML = `
                    <div>Lotería</div>
                    <div>Prev<br>10:15</div>
                    <div>Prim<br>12:00</div>
                    <div>Matu<br>15:00</div>
                    <div>Vesp<br>18:00</div>
                    <div>Noct<br>21:00</div>
                `;
                gridContenedor.appendChild(filaHeader);

                provinciasObjetivo.forEach(provincia => {
                    const arrayNumeros = datosLoterias[provincia] || ["----", "----", "----", "----", "----"];
                    
                    const filaItem = document.createElement('div');
                    filaItem.className = "fila-grid";
                    filaItem.innerHTML += `<div class="celda-provincia">${provincia}</div>`;
                    
                    arrayNumeros.forEach(num => {
                        const esActivo = num && num !== "----" && num.trim() !== "" ? "numero-activo" : "";
                        filaItem.innerHTML += `
                            <div class="celda-numero">
                                <span class="badge-numero ${esActivo}">${num}</span>
                            </div>`;
                    });
                    
                    gridContenedor.appendChild(filaItem);
                });

                document.getElementById('panel-quiniela').style.display = 'block';
                document.getElementById('contingencia-iframe').style.display = 'none';

            } catch (error) {
                console.warn("Falla en proxy. Activando Iframe:", error);
                document.getElementById('panel-quiniela').style.display = 'none';
                
                const iframe = document.getElementById('iframe-banner');
                if(!iframe.src) {
                    iframe.src = targetUrl;
                }
                document.getElementById('contingencia-iframe').style.display = 'block';
            }
        }

        // Encapsulado e inicio automático seguro
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', cargarQuiniela);
        } else {
            cargarQuiniela();
        }
        
        setInterval(cargarQuiniela, 30000);
    })();
</script>

<p style="color: transparent; user-select: none;">Resultados de quinielas y sorteos. Todos los resultados corresponden a los ultimos sorteos realizaados</p>
