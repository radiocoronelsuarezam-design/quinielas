<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra de Quinielas Oficiales</title>
    <style>
        /* ==========================================================================
           Diseño Premium y Limpio (Fondo Blanco)
           ========================================================================== */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            padding: 40px 15px;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        #panel-quiniela {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: none;
        }

        #loader {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        /* Cabecera Oficial */
        .cabecera-oficial {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 24px;
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
        }

        .cabecera-titulo {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0f172a;
            margin: 0;
        }

        .pastilla-fecha {
            background-color: #f1f5f9;
            color: #475569;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid #e2e8f0;
        }

        /* Estructura GRID Exclusiva */
        .tabla-grid {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fila-grid {
            display: grid;
            grid-template-columns: 2.2fr repeat(5, 1fr); 
            align-items: center;
            padding: 12px 4px;
            border-bottom: 1px solid #f8fafc;
        }

        /* Encabezados de Turnos */
        .cabecera-grid {
            background-color: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 700;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 14px 4px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .cabecera-grid div:first-child {
            text-align: left;
            padding-left: 8px;
            color: #475569;
        }

        /* Celdas de las Provincias */
        .celda-provincia {
            font-weight: 600;
            font-size: 13.5px;
            color: #334155;
            padding-left: 8px;
        }

        .celda-numero {
            text-align: center;
        }

        /* Formato de las Pastillas de Números */
        .badge-numero {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1; /* Gris para '----' */
            background: #f8fafc;
            padding: 6px 2px;
            border-radius: 6px;
            display: block;
            margin: 0 3px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Resaltado Verde para Números Ya Sorteados */
        .numero-activo {
            color: #166534 !important;
            background: #dcfce7 !important;
            font-weight: 700 !important;
        }

        .fila-grid:not(.cabecera-grid):hover {
            background-color: #f8fafc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="loader">Sincronizando números de las loterías...</div>

    <div id="panel-quiniela">
        <header class="cabecera-oficial">
            <h1 class="cabecera-titulo">Resultados de quinielas</h1>
            <span class="pastilla-fecha" id="fecha-sorteo">--/--/----</span>
        </header>
        
        <div class="tabla-grid" id="grid-resultados"></div>
    </div>

    <script>
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        // Orden de las provincias tal cual aparecen en el documento original
        const provinciasObjetivo = [
            "Ciudad", "Provincia", "Santa Fe", "Cordoba", "Mendoza", 
            "Entre Rios", "Corrientes", "Neuquen", "Rio Negro", "Chaco", "Jujuy", "Formosa"
        ];

        async function cargarQuiniela() {
            try {
                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!respuesta.ok) throw new Error("Error en el proxy");
                
                const textoHtml = await respuesta.text();
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');

                // 1. EXTRACCIÓN SEGURA DE LA FECHA
                let fechaEncontrada = "--/--/----";
                const todosLosFuentes = docInterno.querySelectorAll('font');
                for (let font of todosLosFuentes) {
                    if (font.textContent.includes("FECHA:")) {
                        const match = font.textContent.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
                        if (match) {
                            fechaEncontrada = match[0];
                            break;
                        }
                    }
                }
                document.getElementById('fecha-sorteo').textContent = fechaEncontrada;

                // Diccionario de almacenamiento
                let datosLoterias = {};
                provinciasObjetivo.forEach(p => datosLoterias[p] = []);

                // 2. NUEVO EXTRACTOR SECUENCIAL GLOBAL (A PRUEBA DE FALLOS)
                // Obtenemos absolutamente todas las celdas TD del documento remoto
                const celdasGlobales = Array.from(docInterno.querySelectorAll('td'));

                for (let i = 0; i < celdasGlobales.length; i++) {
                    const textoCelda = celdasGlobales[i].textContent.trim();

                    // Si encontramos una celda que contiene exactamente una provincia de nuestra lista
                    if (provinciasObjetivo.includes(textoCelda) && datosLoterias[textoCelda].length === 0) {
                        let numerosDeEstaProvincia = [];
                        
                        // Avanzamos por las celdas que están inmediatamente después de la provincia
                        let j = i + 1;
                        while (j < celdasGlobales.length && numerosDeEstaProvincia.length < 5) {
                            const posibleNumero = celdasGlobales[j].textContent.trim();
                            
                            // Si el texto es un número de 4 dígitos o los guiones de espera '----'
                            if (posibleNumero.length === 4 || posibleNumero === "----") {
                                numerosDeEstaProvincia.push(posibleNumero);
                            }
                            j++;
                        }

                        // Si recolectamos correctamente las 5 posiciones consecutivas, las guardamos
                        if (numerosDeEstaProvincia.length === 5) {
                            datosLoterias[textoCelda] = numerosDeEstaProvincia;
                        }
                    }
                }

                // 3. CONSTRUCCIÓN DEL PANEL GRÁFICO NUEVO
                const gridContenedor = document.getElementById('grid-resultados');
                gridContenedor.innerHTML = "";

                // Inyectar Horarios de la Pizarra
                const filaHeader = document.createElement('div');
                filaHeader.className = "fila-grid cabecera-grid";
                filaHeader.innerHTML = `
                    <div>Lotería</div>
                    <div>Prev<br>10:15</div>
                    <div>Prim<br>12:00</div>
                    <div>Matu<br>15:00</div>
                    <div>Vesp<br>18:00</div>
                    <div>Noct<br>21:00</div>
                `;
                gridContenedor.appendChild(filaHeader);

                // Inyectar Datos Mapeados por Columna
                provinciasObjetivo.forEach(provincia => {
                    const arrayNumeros = datosLoterias[provincia];
                    
                    if (arrayNumeros && arrayNumeros.length === 5) {
                        const filaItem = document.createElement('div');
                        filaItem.className = "fila-grid";
                        
                        filaItem.innerHTML += `<div class="celda-provincia">${provincia}</div>`;
                        
                        arrayNumeros.forEach(num => {
                            const esActivo = num && num !== "----" && num.trim() !== "" ? "numero-activo" : "";
                            filaItem.innerHTML += `
                                <div class="celda-numero">
                                    <span class="badge-numero ${esActivo}">${num}</span>
                                </div>`;
                        });
                        
                        gridContenedor.appendChild(filaItem);
                    }
                });

                // Mostrar la interfaz finalizada
                document.getElementById('loader').style.display = 'none';
                document.getElementById('panel-quiniela').style.display = 'block';

            } catch (error) {
                console.error("Error en la extracción:", error);
                document.getElementById('loader').innerHTML = 
                    "Sincronizando con el servidor de loterías...";
                setTimeout(cargarQuiniela, 4000);
            }
        }

        // Ejecutar proceso
        cargarQuiniela();
    </script>
</body>
</html>
