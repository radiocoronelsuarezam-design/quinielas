<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra de Quinielas Oficiales</title>
    <style>
        /* ==========================================================================
           Diseño Premium y Limpio (Fondo Blanco / Estilo Corporativo)
           ========================================================================== */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* Gris ultra claro de fondo general */
            color: #0f172a;
            padding: 40px 15px;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        #panel-quiniela {
            width: 100%;
            max-width: 520px;
            background: #ffffff; /* Fondo blanco para el contenedor principal */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: none;
        }

        #loader {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        /* Cabecera del Panel */
        .cabecera-oficial {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 24px;
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
        }

        .cabecera-titulo {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0f172a;
            margin: 0;
        }

        .pastilla-fecha {
            background-color: #f1f5f9;
            color: #475569;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid #e2e8f0;
        }

        /* Estructura GRID Inteligente */
        .tabla-grid {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fila-grid {
            display: grid;
            grid-template-columns: 2.2fr repeat(5, 1fr); /* Espacio optimizado para nombres y números */
            align-items: center;
            padding: 12px 4px;
            border-bottom: 1px solid #f8fafc;
        }

        /* Cabecera de Turnos (Horarios) */
        .cabecera-grid {
            background-color: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 700;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 14px 4px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .cabecera-grid div:first-child {
            text-align: left;
            padding-left: 8px;
            color: #475569;
        }

        /* Celdas de las Provincias */
        .celda-provincia {
            font-weight: 600;
            font-size: 13.5px;
            color: #334155;
            padding-left: 8px;
        }

        .celda-numero {
            text-align: center;
        }

        /* Diseño de los números */
        .badge-numero {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1; /* Gris claro por defecto (----) */
            background: #f8fafc;
            padding: 6px 2px;
            border-radius: 6px;
            display: block;
            margin: 0 3px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Resaltado para Números Ganadores Sorteados */
        .numero-activo {
            color: #166534 !important; /* Verde oscuro elegante */
            background: #dcfce7 !important; /* Fondo verde pastel sutil */
            font-weight: 700 !important;
        }

        .fila-grid:not(.cabecera-grid):hover {
            background-color: #f8fafc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="loader">Sincronizando números de las loterías...</div>

    <div id="panel-quiniela">
        <header class="cabecera-oficial">
            <h1 class="cabecera-titulo">Resultados de quinielas</h1>
            <span class="pastilla-fecha" id="fecha-sorteo">--/--/----</span>
        </header>
        
        <div class="tabla-grid" id="grid-resultados"></div>
    </div>

    <script>
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://www.tujugada.com.ar/data/qlas/cabezas_web.htm";

        // Listado exacto de las provincias en el orden en que aparecen para mapearlas sin errores
        const provinciasObjetivo = [
            "Ciudad", "Provincia", "Santa Fe", "Cordoba", "Mendoza", 
            "Entre Rios", "Corrientes", "Neuquen", "Rio Negro", "Chaco", "Jujuy", "Formosa"
        ];

        async function cargarQuiniela() {
            try {
                const respuesta = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!respuesta.ok) throw new Error("Error en el proxy");
                
                const textoHtml = await respuesta.text();
                const parser = new DOMParser();
                const docInterno = parser.parseFromString(textoHtml, 'text/html');

                // 1. EXTRAER LA FECHA DE LA CABECERA ORIGINAL
                let fechaEncontrada = "10/7/2026"; // Fecha por defecto basada en tu archivo
                const todosLosFuentes = docInterno.querySelectorAll('font');
                for (let font of todosLosFuentes) {
                    if (font.textContent.includes("FECHA:")) {
                        const match = font.textContent.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
                        if (match) {
                            fechaEncontrada = match[0];
                            break;
                        }
                    }
                }
                document.getElementById('fecha-sorteo').textContent = fechaEncontrada;

                // 2. EXTRAER NÚMEROS DE FORMA LIMPIA
                let datosLoterias = {};
                provinciasObjetivo.forEach(p => datosLoterias[p] = []);

                // Buscamos todas las celdas de la página vieja
                const todasLasCeldas = docInterno.querySelectorAll('td');
                
                todasLasCeldas.forEach((celda) => {
                    const textoCelda = celda.textContent.trim();
                    
                    // Si la celda coincide exactamente con una de nuestras provincias
                    if (provinciasObjetivo.includes(textoCelda)) {
                        let filaActual = celda.closest('tr');
                        if (filaActual) {
                            // Conseguimos todas las celdas hermanas de esta fila de la provincia
                            const celdasHermanas = filaActual.querySelectorAll('td');
                            
                            // Iteramos buscando los 5 bloques numéricos que le siguen
                            let contenedorPadre = filaActual.closest('table'); // Subimos a su mini tabla contenedora
                            if (contenedorPadre) {
                                let tablaPrincipal = contenedorPadre.closest('td')?.closest('tr')?.closest('table');
                                if (tablaPrincipal) {
                                    // Buscamos los valores numéricos secuenciales reales
                                    let celdasDeNumeros = filaActual.parentElement.querySelectorAll('td b font');
                                    let numerosFila = [];
                                    celdasDeNumeros.forEach(n => {
                                        const txt = n.textContent.trim();
                                        if (txt.length === 4 || txt === "----") {
                                            numerosFila.push(txt);
                                        }
                                    });
                                    // Guardamos solo los primeros 5 resultados correspondientes a los turnos
                                    if (numerosFila.length >= 5) {
                                        datosLoterias[textoCelda] = numerosFila.slice(0, 5);
                                    }
                                }
                            }
                        }
                    }
                });

                // Fallback de seguridad: si el parseo anidado falla por las mini-tablas, extraemos directo por texto secuencial
                provinciasObjetivo.forEach(prov => {
                    if (datosLoterias[prov].length === 0) {
                        let textosPlanos = [];
                        let habilitarCaptura = false;
                        
                        docInterno.querySelectorAll('td').forEach(td => {
                            let txt = td.textContent.trim();
                            if (txt === prov) {
                                habilitarCaptura = true;
                                return;
                            }
                            if (habilitarCaptura && (txt.length === 4 || txt === "----") && textosPlanos.length < 5) {
                                textosPlanos.push(txt);
                            } else if (textosPlanos.length === 5) {
                                habilitarCaptura = false;
                            }
                        });
                        if (textosPlanos.length === 5) {
                            datosLoterias[prov] = textosPlanos;
                        }
                    }
                });

                // 3. CONSTRUIR EL NUEVO DISEÑO GRID DESDE CERO
                const gridContenedor = document.getElementById('grid-resultados');
                gridContenedor.innerHTML = "";

                // Generar Fila Estática de Encabezados (Sincronizada con los horarios reales de la imagen)
                const filaHeader = document.createElement('div');
                filaHeader.className = "fila-grid cabecera-grid";
                filaHeader.innerHTML = `
                    <div>Lotería</div>
                    <div>Prev<br>10:15</div>
                    <div>Prim<br>12:00</div>
                    <div>Matu<br>15:00</div>
                    <div>Vesp<br>18:00</div>
                    <div>Noct<br>21:00</div>
                `;
                gridContenedor.appendChild(filaHeader);

                // Generar las filas ordenadas con los datos limpios extraídos
                provinciasObjetivo.forEach(provincia => {
                    const arrayNumeros = datosLoterias[provincia];
                    
                    // Solo agregamos la fila si contiene los datos completos
                    if (arrayNumeros && arrayNumeros.length === 5) {
                        const filaItem = document.createElement('div');
                        filaItem.className = "fila-grid";
                        
                        filaItem.innerHTML += `<div class="celda-provincia">${provincia}</div>`;
                        
                        arrayNumeros.forEach(num => {
                            const esActivo = num && num !== "----" && num.trim() !== "" ? "numero-activo" : "";
                            filaItem.innerHTML += `
                                <div class="celda-numero">
                                    <span class="badge-numero ${esActivo}">${num}</span>
                                </div>`;
                        });
                        
                        gridContenedor.appendChild(filaItem);
                    }
                });

                // Renderizado exitoso
                document.getElementById('loader').style.display = 'none';
                document.getElementById('panel-quiniela').style.display = 'block';

            } catch (error) {
                console.error("Error en la extracción:", error);
                document.getElementById('loader').innerHTML = 
                    "Error de conexión con la pizarra oficial. Reintentando...";
                setTimeout(cargarQuiniela, 4000);
            }
        }

        cargarQuiniela();
    </script>
</body>
</html>
