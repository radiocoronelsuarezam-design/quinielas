name: Actualizar Quiniela Gist

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar
        env:
          TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "7c5ad924c12309fcdfcfc5c64269f8e9"
        run: |
          # Crear el contenido JSON
          echo '{"estado": "actualizado", "fecha": "2026-07-10"}' > quiniela.json
          
          # Construir payload seguro con jq
          jq -n --arg file "quiniela.json" --arg content "$(cat quiniela.json)" \
          '{files: {($file): {content: $content}}}' > payload.json
          
          # Enviar a la API de GitHub
          curl -s -X PATCH -H "Authorization: token $TOKEN" \
          -H "Content-Type: application/json" \
          -d @payload.json \
          https://api.github.com/gists/$GIST_ID
